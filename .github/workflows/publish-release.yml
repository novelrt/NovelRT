name: Publish Release

on:
  release:
    types: [published]

jobs:
  Build:
    name: ${{ matrix.os }} - Vulkan ${{ matrix.vulkan }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-24.04, macos-15, macos-26]
        vulkan: [1.4.313.0]
        include:
        - os: windows-2025
          title: Windows
        - os: ubuntu-24.04
          title: Ubuntu 24.04
        - os: macos-15
          title: MacOS 15
        - os: macos-26
          title: MacOS 26

    steps:
      - name: Preinstall dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo tee /etc/apt/sources.list.d/llvm-toolchain.list <<EOF
          deb http://apt.llvm.org/noble/ llvm-toolchain-noble main
          deb-src http://apt.llvm.org/noble/ llvm-toolchain-noble main
          # 21
          deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main
          deb-src http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main
          # 22
          deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main
          deb-src http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main
          EOF
          sudo apt-get update
          sudo apt-get install libglm-dev cmake libxcb-dri3-0 libxcb-present0 \
            libpciaccess0 libpng-dev libxcb-keysyms1-dev libxcb-dri3-dev \
            libx11-dev libwayland-dev libxrandr-dev libxcb-randr0-dev \
            libxcb-ewmh-dev git python-is-python3 bison libx11-xcb-dev \
            libxcursor-dev libxi-dev libxinerama-dev libxkbcommon-dev \
            libxext-dev liblz4-dev libzstd-dev ocaml-core ninja-build \
            pkg-config libxml2-dev wayland-protocols python3-jsonschema \
            clang-21 qtbase5-dev qt6-base-dev

          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-21 20
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-21 10

          sudo update-alternatives --set cc /usr/bin/clang-21
          sudo update-alternatives --set c++ /usr/bin/clang++-21

      - uses: actions/checkout@v4

      - uses: novelrt/setup-cpp@v2
        id: setup-cpp
        with:
          compiler-id: ${{ (runner.os == 'Windows' && 'MSVC') || 'Clang' }}

      - uses: novelrt/setup-vulkan@v2.1
        with:
          version: ${{ matrix.vulkan }}

      - name: Generate build system
        run: cmake -G Ninja -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_EXPORT_COMPILE_COMMANDS=ON --install-prefix "$(pwd)/artefacts"

      - name: Build NovelRT
        run: cmake --build build --config RelWithDebInfo --parallel
      - name: Install NovelRT
        run: cmake --install build --config RelWithDebInfo --prefix artefacts

      - name: Publish build artefacts
        shell: pwsh
        run: |
          Compress-Archive -Path $(Get-ChildItem artefacts/*) -DestinationPath "novelrt-${{ github.event.release.tag_name }}-${{ matrix.os }}.zip"
          gh release upload ${{ github.event.release.tag_name }} "novelrt-${{ github.event.release.tag_name }}-${{ matrix.os }}.zip#${{ github.event.release.name }} - ${{ matrix.title }}" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
